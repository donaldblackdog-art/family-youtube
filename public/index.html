<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>초초TV</title>
    <link rel="stylesheet" href="/public/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">초초TV</a>
      <nav class="top-actions">
        <span id="role-label" class="role-label">확인 중</span>
        <a id="admin-link" class="text-link" href="/admin">관리자 로그인</a>
        <label id="upload-button" class="upload-button admin-only" for="upload-toggle">Drive 링크 등록</label>
      </nav>
    </header>

    <main>
      <input id="upload-toggle" class="hidden-toggle" type="checkbox">
      <section class="upload-panel">
        <form id="drive-form" action="/api/drive-videos" method="post">
          <h2>구글드라이브 영상 등록</h2>
          <p class="form-note">구글드라이브에 영상을 올린 뒤, 공유 링크를 붙여넣으면 초초TV에서 볼 수 있습니다.</p>
          <div class="form-grid">
            <label>
              <span>제목</span>
              <input name="title" type="text" placeholder="예: 제주 가족여행" required>
            </label>
            <label>
              <span>촬영 날짜</span>
              <input name="recordedDate" type="date">
            </label>
          </div>
          <label>
            <span>구글드라이브 공유 링크</span>
            <input name="driveUrl" type="url" placeholder="https://drive.google.com/file/d/..." required>
          </label>
          <label>
            <span>메모</span>
            <textarea name="description" rows="3" placeholder="날짜, 장소, 함께 나온 사람들을 적어두면 나중에 찾기 좋습니다."></textarea>
          </label>
          <p id="drive-status" class="thumbnail-status"></p>
          <button type="submit">등록</button>
        </form>
      </section>

      <section class="video-section">
        <div class="section-head compact-section-head">
          <p id="count">불러오는 중</p>
          <label class="sort-control">
            <span>정렬</span>
            <select id="sort-select">
              <option value="uploaded">등록일 순서</option>
              <option value="recorded">촬영 날짜 순서</option>
            </select>
          </label>
        </div>
        <div id="video-grid" class="video-grid"></div>
      </section>
    </main>

    <script src="/public/app.js"></script>
  </body>
</html>
