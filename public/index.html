<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>초초TV</title>
    <link rel="stylesheet" href="/public/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">초초TV</a>
      <nav class="top-actions">
        <span id="role-label" class="role-label">확인 중</span>
        <a id="admin-link" class="text-link" href="/admin">관리자 로그인</a>
        <label id="upload-button" class="upload-button admin-only" for="upload-toggle">영상 올리기</label>
      </nav>
    </header>

    <main>
      <input id="upload-toggle" class="hidden-toggle" type="checkbox">
      <section class="upload-panel">
        <form id="upload-form" action="/api/upload" method="post" enctype="multipart/form-data">
          <div class="form-grid">
            <label>
              <span>제목</span>
              <input name="title" type="text" placeholder="예: 제주 가족여행" required>
            </label>
            <label>
              <span>촬영 날짜</span>
              <input name="recordedDate" type="date">
            </label>
            <label>
              <span>영상 파일</span>
              <input id="video-file" name="video" type="file" accept="video/*" required>
            </label>
          </div>
          <input id="thumbnail-data" name="thumbnailData" type="hidden">
          <p id="thumbnail-status" class="thumbnail-status">영상을 선택하면 썸네일을 자동으로 뽑습니다.</p>
          <label>
            <span>메모</span>
            <textarea name="description" rows="3" placeholder="날짜, 장소, 함께 나온 사람들을 적어두면 나중에 찾기 좋습니다."></textarea>
          </label>
          <button type="submit">업로드</button>
        </form>
      </section>

      <section class="video-section">
        <div class="section-head compact-section-head">
          <p id="count">불러오는 중</p>
          <label class="sort-control">
            <span>정렬</span>
            <select id="sort-select">
              <option value="uploaded">업로드일 순서</option>
              <option value="recorded">촬영 날짜 순서</option>
            </select>
          </label>
        </div>
        <div id="video-grid" class="video-grid"></div>
      </section>
    </main>

    <script src="/public/app.js"></script>
  </body>
</html>
