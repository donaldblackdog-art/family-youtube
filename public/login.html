<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>초초TV 가족 보기</title>
    <link rel="stylesheet" href="/public/styles.css">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <form class="login-form" action="/api/login" method="post">
        <div class="login-brand">
          <span class="login-mark">초</span>
          <div>
            <h1>초초TV</h1>
            <p>우리 가족 영상 보관함</p>
          </div>
        </div>
        <p class="login-help">가족 보기 비밀번호를 입력해 주세요.</p>
        <input name="password" type="password" autocomplete="current-password" autofocus>
        <button type="submit">가족 보기로 들어가기</button>
        <p class="error" id="error">비밀번호가 맞지 않습니다.</p>
        <div class="secondary-login">
          <span>Drive 링크 등록과 삭제가 필요하신가요?</span>
          <a class="text-link" href="/admin">관리자 로그인</a>
        </div>
      </form>
    </main>
    <script>
      if (!new URL(location.href).searchParams.has("error")) {
        document.getElementById("error").style.display = "none";
      }
    </script>
  </body>
</html>
